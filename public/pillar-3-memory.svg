<svg
  width="520"
  height="440"
  viewBox="0 0 520 440"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="Claude reviews a competitor and captures a page, a key fact, and a risk to the shared brain — all in one reply"
>
  <title>Three structured captures land in the shared brain from a single Claude reply</title>

  <!-- ─── Card shell ─── -->
  <rect width="520" height="440" rx="12" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="519" height="439" rx="11.5" fill="none" stroke="#dcdfe6" stroke-width="1"/>

  <!-- ─── Header bar ─── -->
  <rect width="520" height="48" rx="12" fill="#f9f8f6"/>
  <rect y="36" width="520" height="12" fill="#f9f8f6"/>
  <line x1="0" y1="48" x2="520" y2="48" stroke="#dcdfe6" stroke-width="1"/>

  <!-- Active status dot -->
  <circle cx="26" cy="24" r="5" fill="#2a9f73"/>

  <!-- "Claude" label -->
  <text x="40" y="30"
    font-family="'Geist', system-ui, -apple-system, sans-serif"
    font-size="13" font-weight="500" fill="#1e2228">Claude</text>

  <!-- "octopad workspace" -->
  <text x="494" y="30"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="10" fill="#909298" text-anchor="end">octopad workspace</text>

  <!-- ─── User message ─── -->
  <text x="494" y="65"
    font-family="'Geist', system-ui, -apple-system, sans-serif"
    font-size="10" fill="#909298" text-anchor="end">Alex</text>

  <rect x="108" y="73" width="392" height="36" rx="8" fill="#1e2228"/>
  <text x="122" y="96"
    font-family="'Geist', system-ui, -apple-system, sans-serif"
    font-size="13" fill="#f9f8f6">Can you review Brieflab? I keep hearing their name.</text>

  <!-- ─── Tool use: web search ─── -->
  <!-- Magnifying glass glyph -->
  <circle cx="32" cy="120" r="5.5" fill="none" stroke="#909298" stroke-width="1.4"/>
  <line x1="36.1" y1="124.1" x2="40" y2="128"
    stroke="#909298" stroke-width="1.4" stroke-linecap="round"/>

  <text x="50" y="124"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="10" fill="#909298">searching the web · 5 sources</text>

  <!-- ─── Claude label ─── -->
  <text x="20" y="141"
    font-family="'Geist', system-ui, -apple-system, sans-serif"
    font-size="10" fill="#909298">Claude</text>

  <!-- ─── Main capture block ─── -->
  <rect x="20" y="148" width="480" height="248" rx="8" fill="#ffffff" stroke="#dcdfe6" stroke-width="1"/>

  <!-- Green left accent bar -->
  <line x1="22.5" y1="158" x2="22.5" y2="388"
    stroke="#2a9f73" stroke-width="3" stroke-linecap="round"/>

  <!-- Block header: checkmark + label -->
  <circle cx="44" cy="162" r="8" fill="#e8f4ee"/>
  <polyline points="40,162 43.5,165.5 49,159"
    stroke="#2a9f73" stroke-width="1.8" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
  <text x="61" y="167"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="11.5" font-weight="600" fill="#2a9f73" letter-spacing="0.2">Saved to your workspace</text>

  <!-- Divider after header -->
  <line x1="36" y1="178" x2="500" y2="178" stroke="#dcdfe6" stroke-width="1"/>

  <!-- ═══ ROW 1 — PAGE ═══ -->
  <!-- Badge -->
  <rect x="36" y="186" width="40" height="18" rx="3" fill="#e8f4ee"/>
  <text x="56" y="199"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="9" font-weight="700" fill="#2a9f73" text-anchor="middle" letter-spacing="0.8">PAGE</text>

  <!-- Folder icon (tab + body) -->
  <rect x="87" y="189" width="8" height="4" rx="1"
    fill="#f9f8f6" stroke="#909298" stroke-width="1.1"/>
  <rect x="87" y="192" width="16" height="12" rx="1.5"
    fill="#f9f8f6" stroke="#909298" stroke-width="1.1"/>
  <!-- Cover tab/body seam -->
  <rect x="88" y="192" width="6" height="1.5" fill="#f9f8f6"/>

  <!-- Title and folder path -->
  <text x="113" y="200"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="11.5" fill="#1e2228">Brieflab — competitor review</text>
  <text x="113" y="216"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="10" fill="#909298">Competitors folder</text>

  <!-- Row divider -->
  <line x1="36" y1="230" x2="500" y2="230" stroke="#e8eaed" stroke-width="0.75"/>

  <!-- ═══ ROW 2 — KEY FACT ═══ -->
  <!-- Badge -->
  <rect x="36" y="238" width="40" height="18" rx="3" fill="#eaedf2"/>
  <text x="56" y="251"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="9" font-weight="700" fill="#4a5568" text-anchor="middle" letter-spacing="0.5">FACT</text>

  <!-- Diamond glyph -->
  <polygon points="95,242 99,248 95,254 91,248"
    fill="#eaedf2" stroke="#4a5568" stroke-width="1.2"/>

  <!-- Title -->
  <text x="113" y="254"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="11.5" fill="#1e2228">Brieflab is now a top named competitor</text>

  <!-- Row divider -->
  <line x1="36" y1="268" x2="500" y2="268" stroke="#e8eaed" stroke-width="0.75"/>

  <!-- ═══ ROW 3 — RISK ═══ -->
  <!-- Badge -->
  <rect x="36" y="276" width="40" height="18" rx="3" fill="#fef3e0"/>
  <text x="56" y="289"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="9" font-weight="700" fill="#d97706" text-anchor="middle" letter-spacing="0.8">RISK</text>

  <!-- Warning triangle glyph -->
  <polygon points="95,278 101,290 89,290"
    fill="#fef3e0" stroke="#d97706" stroke-width="1.3"/>
  <text x="95" y="289"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="8" fill="#d97706" text-anchor="middle" font-weight="700">!</text>

  <!-- Title (two lines) -->
  <text x="113" y="289"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="11.5" fill="#1e2228">Brieflab's traction with our ICP</text>
  <text x="113" y="305"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="11.5" fill="#1e2228">may crowd our mindshare</text>

  <!-- Severity badge: Medium -->
  <rect x="439" y="276" width="52" height="18" rx="9"
    fill="#fef3e0" stroke="#d97706" stroke-width="0.75"/>
  <text x="465" y="289"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="9" fill="#d97706" text-anchor="middle" font-weight="600" letter-spacing="0.4">Medium</text>

  <!-- Divider before shared brain footer -->
  <line x1="36" y1="322" x2="500" y2="322" stroke="#dcdfe6" stroke-width="1"/>

  <!-- ─── Shared brain glyph: 3-node network ─── -->
  <!-- Connectors (drawn before nodes so nodes sit on top) -->
  <line x1="44" y1="348" x2="34" y2="360" stroke="#2a9f73" stroke-width="1" opacity="0.45"/>
  <line x1="44" y1="348" x2="54" y2="360" stroke="#2a9f73" stroke-width="1" opacity="0.45"/>
  <line x1="38" y1="360" x2="50" y2="360" stroke="#2a9f73" stroke-width="1" opacity="0.45"/>
  <!-- Nodes -->
  <circle cx="44" cy="344" r="4" fill="#e8f4ee" stroke="#2a9f73" stroke-width="1.2"/>
  <circle cx="34" cy="362" r="4" fill="#e8f4ee" stroke="#2a9f73" stroke-width="1.2"/>
  <circle cx="54" cy="362" r="4" fill="#e8f4ee" stroke="#2a9f73" stroke-width="1.2"/>

  <!-- Labels -->
  <text x="68" y="352"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="10.5" fill="#909298">shared brain updated</text>
  <text x="68" y="368"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="9.5" fill="#c4c6cc">3 items · page + key fact + risk</text>

  <!-- ─── Footer annotation ─── -->
  <text x="494" y="416"
    font-family="'Geist Mono', 'Courier New', monospace"
    font-size="10" fill="#c4c6cc" text-anchor="end">Written automatically · no manual save</text>

</svg>
